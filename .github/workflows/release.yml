name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: nightly-2026-02-16
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_TARGET_DIR: target

jobs:
  verify:
    runs-on: ubuntu-24.04

    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release-tag
        run: echo "tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --no-self-update
          rustup default "$RUST_TOOLCHAIN"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Format
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked --profile fast-build

      - name: Test
        run: cargo test --locked --profile fast-build

  build-artifacts:
    needs: verify
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive: tar.gz
            musl: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive: zip
          - target: i686-pc-windows-msvc
            runner: windows-2025
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --no-self-update
          rustup default "$RUST_TOOLCHAIN"
          rustup target add "${{ matrix.target }}"
          rustc --version
          cargo --version

      - name: Install musl tools
        if: ${{ matrix.musl }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Build release binary
        shell: bash
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Smoke release binary
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/tokenproxy"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi
          "$binary" --version

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${{ needs.verify.outputs.tag }}"
          target="${{ matrix.target }}"
          asset_dir="tokenproxy-${tag}-${target}"
          mkdir -p "dist/${asset_dir}"
          cp "target/${target}/release/tokenproxy" "dist/${asset_dir}/tokenproxy"
          chmod +x "dist/${asset_dir}/tokenproxy"
          tar -C dist -czf "dist/${asset_dir}.tar.gz" "${asset_dir}"
          shasum -a 256 "dist/${asset_dir}.tar.gz" > "dist/${asset_dir}.tar.gz.sha256"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ needs.verify.outputs.tag }}"
          $target = "${{ matrix.target }}"
          $assetDir = "tokenproxy-$tag-$target"
          New-Item -ItemType Directory -Path "dist/$assetDir" -Force | Out-Null
          Copy-Item "target/$target/release/tokenproxy.exe" "dist/$assetDir/tokenproxy.exe"
          Compress-Archive -Path "dist/$assetDir" -DestinationPath "dist/$assetDir.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$assetDir.zip").Hash.ToLowerInvariant()
          "$hash  dist/$assetDir.zip" | Out-File -FilePath "dist/$assetDir.zip.sha256" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tokenproxy-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs: [verify, build-artifacts]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: tokenproxy-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.verify.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --verify-tag --generate-notes
          gh release upload "$tag" dist/*.tar.gz dist/*.zip dist/*.sha256 --clobber

  homebrew:
    name: Update Homebrew Tap
    needs: [verify, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh workflow run update-formula.yml \
            --repo cs50victor/homebrew-tap \
            -f formula=tokenproxy \
            -f tag="${{ needs.verify.outputs.tag }}" \
            -f repository=cs50victor/tokenproxy \
            -f description="Small, fast Rust proxy for OpenAI-compatible agent traffic" \
            -f artifact_template="tokenproxy-v{version}-{target}.tar.gz" \
            -f target_aliases="darwin_amd64=x86_64-apple-darwin,darwin_arm64=aarch64-apple-darwin,linux_amd64=x86_64-unknown-linux-gnu,linux_arm64=aarch64-unknown-linux-gnu"
